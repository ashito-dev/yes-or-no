<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Yes or No? 💗 | سؤال أم لا؟</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #fff5fa 0%, #ffeef5 100%);
            font-family: 'Segoe UI', 'Quicksand', 'Tajawal', -apple-system, BlinkMacSystemFont, 'Poppins', system-ui, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1.5rem;
            position: relative;
        }

        /* main card */
        .card {
            background: rgba(255, 252, 254, 0.94);
            backdrop-filter: blur(12px);
            border-radius: 3.5rem;
            padding: 2.2rem 1.8rem;
            width: 100%;
            max-width: 550px;
            text-align: center;
            box-shadow: 0 30px 50px rgba(245, 120, 160, 0.2), 0 8px 20px rgba(0, 0, 0, 0.02);
            border: 1px solid rgba(255, 235, 245, 0.9);
            transition: all 0.3s ease;
            position: relative;
        }

        /* language switcher button - top right */
        .lang-switcher {
            position: absolute;
            top: 1.2rem;
            right: 1.5rem;
            background: rgba(255, 220, 230, 0.85);
            backdrop-filter: blur(8px);
            border: 1px solid #ffd4e2;
            border-radius: 60px;
            padding: 0.45rem 1rem;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            color: #b84c70;
            display: flex;
            align-items: center;
            gap: 0.4rem;
            font-family: inherit;
            z-index: 10;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        .lang-switcher:hover {
            background: #ffd0dc;
            transform: scale(0.97);
        }
        .lang-switcher:active {
            transform: scale(0.95);
        }
        /* RTL adjustment for Arabic mode */
        body.rtl-mode .lang-switcher {
            right: auto;
            left: 1.5rem;
        }
        body.rtl-mode .card {
            direction: rtl;
        }
        body.rtl-mode .button-group {
            direction: rtl;
        }
        body.rtl-mode .message-area {
            direction: rtl;
        }

        h1 {
            font-size: 2.3rem;
            font-weight: 620;
            background: linear-gradient(135deg, #e86f9c, #f5a3c7);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: -0.3px;
            margin-bottom: 0.5rem;
        }

        .sub {
            font-size: 0.95rem;
            color: #cf7a9c;
            background: #fff0f7;
            display: inline-block;
            padding: 0.35rem 1.3rem;
            border-radius: 60px;
            margin-bottom: 2rem;
            font-weight: 500;
        }

        .button-group {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            gap: 2rem;
            margin: 1.8rem 0 1.5rem;
            position: relative;
            min-height: 130px;
        }

        .btn {
            border: none;
            font-weight: 620;
            border-radius: 100px;
            cursor: pointer;
            font-family: inherit;
            letter-spacing: 0.3px;
            transition: all 0.3s cubic-bezier(0.34, 1.2, 0.64, 1);
            touch-action: manipulation;
            box-shadow: 0 8px 18px rgba(0, 0, 0, 0.05);
            text-align: center;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .btn-yes {
            background: #ffd0dc;
            color: #a54266;
            border: 1px solid #ffeef5;
            box-shadow: 0 10px 22px rgba(233, 110, 140, 0.3);
            font-size: 1.6rem;
            padding: 0.9rem 2rem;
            min-width: 140px;
            will-change: transform, font-size, padding;
        }

        .btn-yes.size-1 { font-size: 1.8rem; padding: 1rem 2.2rem; min-width: 160px; }
        .btn-yes.size-2 { font-size: 2rem; padding: 1.15rem 2.5rem; min-width: 180px; }
        .btn-yes.size-3 { font-size: 2.2rem; padding: 1.3rem 2.8rem; min-width: 200px; }
        .btn-yes.size-4 { font-size: 2.5rem; padding: 1.5rem 3.2rem; min-width: 230px; }
        .btn-yes.size-5 { font-size: 2.8rem; padding: 1.7rem 3.6rem; min-width: 260px; }
        .btn-yes.size-6 { font-size: 3.1rem; padding: 1.9rem 4rem; min-width: 300px; }
        .btn-yes.size-7 { font-size: 3.4rem; padding: 2.1rem 4.4rem; min-width: 330px; }
        .btn-yes.size-max { font-size: 3.7rem; padding: 2.3rem 4.8rem; min-width: 360px; }

        .btn-no {
            background: #f0e3ea;
            color: #9a6f83;
            border: 1px solid #fbeef6;
            font-size: 1.6rem;
            padding: 0.9rem 2rem;
            min-width: 140px;
            transition: all 0.2s ease;
        }

        .btn-no:hover { background: #e8d7e2; transform: scale(0.98); }
        .btn-no:active { transform: scale(0.96); }

        .message-area {
            margin-top: 1.8rem;
            min-height: 90px;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            gap: 0.6rem;
        }

        .try-message {
            background: rgba(255, 240, 245, 0.9);
            padding: 0.7rem 1.5rem;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: 500;
            color: #c65d83;
            backdrop-filter: blur(8px);
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            animation: fadeSlideUp 0.3s ease-out;
            box-shadow: 0 4px 12px rgba(200, 100, 130, 0.1);
            border: 1px solid #ffe2ef;
        }

        .sweet-message {
            background: rgba(255, 245, 250, 0.96);
            padding: 1rem 2rem;
            border-radius: 80px;
            backdrop-filter: blur(12px);
            display: inline-flex;
            align-items: center;
            gap: 0.8rem;
            font-size: 1.6rem;
            font-weight: 600;
            color: #bc4e74;
            box-shadow: 0 15px 30px rgba(245, 120, 160, 0.25);
            border: 1px solid #ffdae8;
            transform: scale(0.9);
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.34, 1.2, 0.64, 1);
        }

        .sweet-message.show {
            transform: scale(1);
            opacity: 1;
        }

        @keyframes fadeSlideUp {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes gentlePop {
            0% { transform: scale(1); }
            50% { transform: scale(1.06); box-shadow: 0 18px 30px rgba(233, 100, 140, 0.4); }
            100% { transform: scale(1); }
        }

        .grow-pop { animation: gentlePop 0.25s ease-out; }

        @keyframes celebratePop {
            0% { transform: scale(0.95); opacity: 0; }
            70% { transform: scale(1.08); }
            100% { transform: scale(1); opacity: 1; }
        }

        .final-celebrate { animation: celebratePop 0.5s cubic-bezier(0.34, 1.3, 0.64, 1) forwards; }

        .footer-whisper {
            margin-top: 1.8rem;
            font-size: 0.7rem;
            color: #e0a5bd;
            opacity: 0.7;
            font-weight: 400;
        }

        @media (max-width: 550px) {
            .card { padding: 1.6rem 1.2rem; border-radius: 2.5rem; }
            .btn-yes, .btn-no { font-size: 1.3rem; padding: 0.7rem 1.3rem; min-width: 115px; }
            .btn-yes.size-1 { font-size: 1.5rem; padding: 0.85rem 1.6rem; min-width: 130px; }
            .btn-yes.size-2 { font-size: 1.7rem; padding: 1rem 1.9rem; min-width: 145px; }
            .btn-yes.size-3 { font-size: 1.9rem; padding: 1.15rem 2.2rem; min-width: 165px; }
            .btn-yes.size-4 { font-size: 2.1rem; padding: 1.3rem 2.5rem; min-width: 185px; }
            .btn-yes.size-5 { font-size: 2.3rem; padding: 1.5rem 2.8rem; min-width: 205px; }
            .btn-yes.size-6 { font-size: 2.5rem; padding: 1.7rem 3.1rem; min-width: 225px; }
            .btn-yes.size-7 { font-size: 2.7rem; padding: 1.9rem 3.4rem; min-width: 245px; }
            .btn-yes.size-max { font-size: 2.9rem; padding: 2.1rem 3.7rem; min-width: 265px; }
            .sweet-message { font-size: 1.3rem; padding: 0.7rem 1.5rem; }
            .try-message { font-size: 0.95rem; padding: 0.5rem 1.2rem; }
            h1 { font-size: 1.8rem; }
            .lang-switcher { top: 0.8rem; right: 1rem; padding: 0.35rem 0.8rem; font-size: 0.7rem; }
            body.rtl-mode .lang-switcher { right: auto; left: 1rem; }
        }

        @keyframes floatUp {
            0% { transform: translateY(0) rotate(0deg); opacity: 0.8; }
            100% { transform: translateY(-300px) rotate(15deg); opacity: 0; }
        }
    </style>
</head>
<body>
<div class="card">
    <button class="lang-switcher" id="langToggleBtn">🇸🇦 العربية</button>
    
    <!-- English content (default visible) -->
    <div id="enContent">
        <h1>🌸 a little question 🌸</h1>
        <div class="sub">will you be my sunshine?</div>
        <div class="button-group">
            <button class="btn btn-yes" id="yesButtonEn">Yes 💖</button>
            <button class="btn btn-no" id="noButtonEn">No ⋆˚✿</button>
        </div>
        <div class="message-area" id="messageAreaEn"></div>
        <div class="footer-whisper">✨ click "No" and watch the magic ✨</div>
    </div>

    <!-- Arabic content (hidden by default) -->
    <div id="arContent" style="display: none;">
        <h1>🌸 سؤال صغير 🌸</h1>
        <div class="sub">هل تكون شمسي؟ 💫</div>
        <div class="button-group">
            <button class="btn btn-yes" id="yesButtonAr">نعم 💖</button>
            <button class="btn btn-no" id="noButtonAr">لا ⋆˚✿</button>
        </div>
        <div class="message-area" id="messageAreaAr"></div>
        <div class="footer-whisper">✨ اضغط "لا" وسترى السحر ✨</div>
    </div>
</div>

<script>
    (function() {
        // ---- BILINGUAL STATE ----
        let currentLang = 'en'; // 'en' or 'ar'
        const enDiv = document.getElementById('enContent');
        const arDiv = document.getElementById('arContent');
        const toggleBtn = document.getElementById('langToggleBtn');
        const bodyEl = document.body;
        
        // ---- DATA FOR BOTH LANGUAGES ----
        // English state
        let enNoClickCount = 0;
        let enYesDisabled = false;
        
        // Arabic state
        let arNoClickCount = 0;
        let arYesDisabled = false;
        
        // DOM elements references (will be updated on toggle)
        let activeYesBtn, activeNoBtn, activeMessageArea;
        let activeYesDisabledFlag = false;
        let activeNoClickCount = 0;
        
        // ---- Helper functions for UI update ----
        function updateYesButtonSize(lang, count) {
            const btn = (lang === 'en') ? document.getElementById('yesButtonEn') : document.getElementById('yesButtonAr');
            if (!btn) return;
            btn.classList.remove('size-1', 'size-2', 'size-3', 'size-4', 'size-5', 'size-6', 'size-7', 'size-max');
            if (count === 1) btn.classList.add('size-1');
            else if (count === 2) btn.classList.add('size-2');
            else if (count === 3) btn.classList.add('size-3');
            else if (count === 4) btn.classList.add('size-4');
            else if (count === 5) btn.classList.add('size-5');
            else if (count === 6) btn.classList.add('size-6');
            else if (count === 7) btn.classList.add('size-7');
            else if (count >= 8) btn.classList.add('size-max');
            
            btn.classList.add('grow-pop');
            setTimeout(() => btn.classList.remove('grow-pop'), 260);
        }
        
        // Try again messages lists
        const enTryMessages = [
            "💕 try again... pretty please? 💕", "🌷 not yet... come on, say yes! 🌷",
            "🍰 hmm... maybe next time? say yes! 🍰", "✨ one more try? yes is waiting ✨",
            "🎀 awww... but yes is getting bigger! 🎀", "🌸 don't give up... yes loves you! 🌸",
            "💗 just click yes already! 💗", "🍬 keep going... yes grows with love 🍬",
            "🌟 every 'no' makes yes stronger 🌟", "💖 you're so close... say yes! 💖"
        ];
        const arTryMessages = [
            "💕 حاول مرة أخرى... أرجوك! 💕", "🌷 لا تستسلم... قل نعم! 🌷",
            "🍰 همم... المرة القادمة؟ قل نعم! 🍰", "✨ محاولة أخرى؟ نعم تنتظرك ✨",
            "🎀 أووه... لكن نعم تكبر! 🎀", "🌸 لا تتردد... نعم تحبك! 🌸",
            "💗 فقط اضغط نعم الآن! 💗", "🍬 استمر... نعم تكبر بالحب 🍬",
            "🌟 كل 'لا' يجعل نعم أقوى 🌟", "💖 أنت قريب جدًا... قل نعم! 💖"
        ];
        
        function showTryAgainMessage(lang, clickCount, messageAreaElem) {
            if (!messageAreaElem) return;
            const existingSweet = messageAreaElem.querySelector('.sweet-message');
            if (existingSweet) existingSweet.remove();
            
            const messagesList = (lang === 'en') ? enTryMessages : arTryMessages;
            let msgIndex = clickCount % messagesList.length;
            let messageText = messagesList[msgIndex];
            if (clickCount >= 5) messageText = "💪 " + messageText + " 💪";
            if (clickCount >= 10) messageText = "✨ " + messageText + " ✨";
            
            const tryDiv = document.createElement('div');
            tryDiv.className = 'try-message';
            tryDiv.innerHTML = `<span>💭</span> ${messageText} <span>💭</span>`;
            const oldTry = messageAreaElem.querySelector('.try-message');
            if (oldTry) oldTry.remove();
            messageAreaElem.appendChild(tryDiv);
            tryDiv.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }
        
        function showSweetFinalMessage(lang, messageAreaElem, yesBtnElem, noBtnElem) {
            if (!messageAreaElem) return;
            const oldTry = messageAreaElem.querySelector('.try-message');
            if (oldTry) oldTry.remove();
            const oldSweet = messageAreaElem.querySelector('.sweet-message');
            if (oldSweet) oldSweet.remove();
            
            const sweetDiv = document.createElement('div');
            sweetDiv.className = 'sweet-message';
            if (lang === 'en') {
                sweetDiv.innerHTML = `<span>🎀</span><span>Yaaay ❤️ I knew it!</span><span>🌸</span>`;
            } else {
                sweetDiv.innerHTML = `<span>🎀</span><span>ياااي ❤️ كنت أعرفها!</span><span>🌸</span>`;
            }
            messageAreaElem.appendChild(sweetDiv);
            void sweetDiv.offsetHeight;
            sweetDiv.classList.add('show');
            sweetDiv.classList.add('final-celebrate');
            
            if (yesBtnElem) {
                yesBtnElem.classList.add('grow-pop');
                setTimeout(() => yesBtnElem.classList.remove('grow-pop'), 500);
            }
            
            // floating hearts
            const card = document.querySelector('.card');
            for (let i = 0; i < 12; i++) {
                const heart = document.createElement('div');
                heart.innerHTML = ['💖', '🌸', '💗', '✨', '🎀', '💕'][Math.floor(Math.random() * 6)];
                heart.style.position = 'absolute';
                heart.style.fontSize = (Math.random() * 20 + 16) + 'px';
                heart.style.left = Math.random() * 90 + '%';
                heart.style.bottom = '-20px';
                heart.style.opacity = '0.8';
                heart.style.pointerEvents = 'none';
                heart.style.zIndex = '10';
                heart.style.animation = `floatUp ${Math.random() * 2 + 2}s ease-out forwards`;
                card.style.position = 'relative';
                card.appendChild(heart);
                setTimeout(() => heart.remove(), 2800);
            }
            
            // disable No button
            if (noBtnElem) {
                noBtnElem.disabled = true;
                noBtnElem.style.opacity = '0.5';
                noBtnElem.style.cursor = 'default';
                noBtnElem.style.pointerEvents = 'none';
            }
            if (yesBtnElem) {
                yesBtnElem.disabled = true;
                yesBtnElem.style.cursor = 'default';
            }
        }
        
        // Create event handlers for a specific language
        function setupLanguageHandlers(lang) {
            const yesBtn = (lang === 'en') ? document.getElementById('yesButtonEn') : document.getElementById('yesButtonAr');
            const noBtn = (lang === 'en') ? document.getElementById('noButtonEn') : document.getElementById('noButtonAr');
            const messageArea = (lang === 'en') ? document.getElementById('messageAreaEn') : document.getElementById('messageAreaAr');
            
            if (!yesBtn || !noBtn) return;
            
            // Remove old listeners by cloning + replacing (clean approach)
            const newYes = yesBtn.cloneNode(true);
            const newNo = noBtn.cloneNode(true);
            yesBtn.parentNode.replaceChild(newYes, yesBtn);
            noBtn.parentNode.replaceChild(newNo, noBtn);
            
            const finalYesBtn = newYes;
            const finalNoBtn = newNo;
            
            // Update global references
            if (lang === 'en') {
                document.getElementById('yesButtonEn')?.parentNode?.replaceChild?.(finalYesBtn, document.getElementById('yesButtonEn'));
                document.getElementById('noButtonEn')?.parentNode?.replaceChild?.(finalNoBtn, document.getElementById('noButtonEn'));
                // reassign after replace
                window.yesButtonEn = finalYesBtn;
                window.noButtonEn = finalNoBtn;
            } else {
                document.getElementById('yesButtonAr')?.parentNode?.replaceChild?.(finalYesBtn, document.getElementById('yesButtonAr'));
                document.getElementById('noButtonAr')?.parentNode?.replaceChild?.(finalNoBtn, document.getElementById('noButtonAr'));
                window.yesButtonAr = finalYesBtn;
                window.noButtonAr = finalNoBtn;
            }
            
            // attach fresh handlers with closure over lang and current counts
            let noClickCountVar = (lang === 'en') ? enNoClickCount : arNoClickCount;
            let yesDisabledVar = (lang === 'en') ? enYesDisabled : arYesDisabled;
            
            const onNoClick = (e) => {
                e.preventDefault();
                e.stopPropagation();
                if ((lang === 'en' && enYesDisabled) || (lang === 'ar' && arYesDisabled)) return;
                let count = (lang === 'en') ? enNoClickCount : arNoClickCount;
                count++;
                if (lang === 'en') enNoClickCount = count;
                else arNoClickCount = count;
                
                // update size
                updateYesButtonSize(lang, count);
                // show try again message
                const currentMsgArea = (lang === 'en') ? document.getElementById('messageAreaEn') : document.getElementById('messageAreaAr');
                showTryAgainMessage(lang, count, currentMsgArea);
                
                if (window.navigator && window.navigator.vibrate) window.navigator.vibrate(20);
                finalNoBtn.style.transform = 'scale(0.96)';
                setTimeout(() => { if(finalNoBtn) finalNoBtn.style.transform = ''; }, 120);
            };
            
            const onYesClick = (e) => {
                e.preventDefault();
                e.stopPropagation();
                if ((lang === 'en' && enYesDisabled) || (lang === 'ar' && arYesDisabled)) return;
                // disable further clicks for this language
                if (lang === 'en') enYesDisabled = true;
                else arYesDisabled = true;
                
                const msgArea = (lang === 'en') ? document.getElementById('messageAreaEn') : document.getElementById('messageAreaAr');
                const yesBtnElem = (lang === 'en') ? document.getElementById('yesButtonEn') : document.getElementById('yesButtonAr');
                const noBtnElem = (lang === 'en') ? document.getElementById('noButtonEn') : document.getElementById('noButtonAr');
                showSweetFinalMessage(lang, msgArea, yesBtnElem, noBtnElem);
                
                if (window.navigator && window.navigator.vibrate) window.navigator.vibrate([30,20,30]);
            };
            
            finalNoBtn.addEventListener('click', onNoClick);
            finalNoBtn.addEventListener('touchstart', (e) => { e.preventDefault(); onNoClick(e); }, { passive: false });
            finalYesBtn.addEventListener('click', onYesClick);
            finalYesBtn.addEventListener('touchstart', (e) => { e.preventDefault(); onYesClick(e); }, { passive: false });
            
            // restore disabled state if needed
            if ((lang === 'en' && enYesDisabled) || (lang === 'ar' && arYesDisabled)) {
                finalYesBtn.disabled = true;
                finalYesBtn.style.cursor = 'default';
                finalNoBtn.disabled = true;
                finalNoBtn.style.opacity = '0.5';
                finalNoBtn.style.pointerEvents = 'none';
            } else {
                finalYesBtn.disabled = false;
                finalNoBtn.disabled = false;
                finalNoBtn.style.opacity = '';
                finalNoBtn.style.pointerEvents = '';
            }
            // sync size
            const currentCount = (lang === 'en') ? enNoClickCount : arNoClickCount;
            updateYesButtonSize(lang, currentCount);
        }
        
        // initialize both language handlers
        function initBothLanguages() {
            setupLanguageHandlers('en');
            setupLanguageHandlers('ar');
            // also restore any saved messages if needed (preserve try again messages across toggle? not necessary, but fine)
            // sync sizes after init
            updateYesButtonSize('en', enNoClickCount);
            updateYesButtonSize('ar', arNoClickCount);
            // if any language already had final message, restore final message visuals
            if (enYesDisabled) {
                const msgArea = document.getElementById('messageAreaEn');
                const yesBtn = document.getElementById('yesButtonEn');
                const noBtn = document.getElementById('noButtonEn');
                if (msgArea && !msgArea.querySelector('.sweet-message')) {
                    showSweetFinalMessage('en', msgArea, yesBtn, noBtn);
                }
            }
            if (arYesDisabled) {
                const msgArea = document.getElementById('messageAreaAr');
                const yesBtn = document.getElementById('yesButtonAr');
                const noBtn = document.getElementById('noButtonAr');
                if (msgArea && !msgArea.querySelector('.sweet-message')) {
                    showSweetFinalMessage('ar', msgArea, yesBtn, noBtn);
                }
            }
        }
        
        // ---- SWITCH BETWEEN LANGUAGES ----
        function switchToEnglish() {
            enDiv.style.display = 'block';
            arDiv.style.display = 'none';
            currentLang = 'en';
            toggleBtn.innerHTML = '🇸🇦 العربية';
            bodyEl.classList.remove('rtl-mode');
            bodyEl.style.direction = 'ltr';
            // re-sync active sizes in case
            updateYesButtonSize('en', enNoClickCount);
        }
        
        function switchToArabic() {
            enDiv.style.display = 'none';
            arDiv.style.display = 'block';
            currentLang = 'ar';
            toggleBtn.innerHTML = '🇬🇧 English';
            bodyEl.classList.add('rtl-mode');
            bodyEl.style.direction = 'rtl';
            updateYesButtonSize('ar', arNoClickCount);
        }
        
        // Toggle function
        function toggleLanguage() {
            if (currentLang === 'en') {
                switchToArabic();
            } else {
                switchToEnglish();
            }
        }
        
        // attach toggle event
        toggleBtn.addEventListener('click', toggleLanguage);
        
        // initial setup: show English, hide Arabic
        switchToEnglish();
        initBothLanguages();
        
        // add initial welcome message in English (disappears)
        setTimeout(() => {
            const enMsgArea = document.getElementById('messageAreaEn');
            if (enMsgArea && !enYesDisabled) {
                const welcome = document.createElement('div');
                welcome.className = 'try-message';
                welcome.innerHTML = `<span>🌸</span> click "No" if you dare... yes will grow! <span>🌸</span>`;
                enMsgArea.appendChild(welcome);
                setTimeout(() => {
                    if (welcome && welcome.parentNode) {
                        welcome.style.opacity = '0';
                        welcome.style.transition = 'opacity 0.5s';
                        setTimeout(() => { if (welcome.parentNode) welcome.remove(); }, 500);
                    }
                }, 2800);
            }
        }, 400);
        
        // add welcome message for Arabic if not yet triggered
        setTimeout(() => {
            const arMsgArea = document.getElementById('messageAreaAr');
            if (arMsgArea && !arYesDisabled && !arMsgArea.querySelector('.try-message')) {
                const welcomeAr = document.createElement('div');
                welcomeAr.className = 'try-message';
                welcomeAr.innerHTML = `<span>🌸</span> اضغط "لا" إن كنت تجرؤ... نعم سيكبر! <span>🌸</span>`;
                arMsgArea.appendChild(welcomeAr);
                setTimeout(() => {
                    if (welcomeAr && welcomeAr.parentNode) {
                        welcomeAr.style.opacity = '0';
                        welcomeAr.style.transition = 'opacity 0.5s';
                        setTimeout(() => { if (welcomeAr.parentNode) welcomeAr.remove(); }, 500);
                    }
                }, 2800);
            }
        }, 500);
        
        // extra style for disabled buttons
        const style = document.createElement('style');
        style.textContent = `
            .btn:disabled { opacity: 0.8; filter: saturate(1.05); cursor: default; }
            .btn-yes:disabled { background: #ffd9e3; transform: scale(1); }
            .btn-no:disabled { background: #f0e3ea; transform: scale(1); }
        `;
        document.head.appendChild(style);
    })();
</script>
</body>
</html>
